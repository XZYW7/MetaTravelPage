<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>旅行指南</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%235BC0EB' width='100' height='25'/><rect fill='%23F5A9B8' y='25' width='100' height='25'/><rect fill='%23FFFFFF' y='50' width='100' height='25'/><rect fill='%23F5A9B8' y='75' width='100' height='25'/></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="track" id="track">
    <!-- 卡片由 core/renderer.js 动态生成 -->
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="goPrev()">← 上一页</button>
    <button class="diary-btn-new" id="diaryBtn" onclick="openCalendar()">✏️ 日记</button>
    <span class="nav-counter" id="navCounter">-- / --</span>
    <button class="nav-btn" id="nextBtn" onclick="goNext()">下一页 →</button>
  </div>

  <!-- 页码选择器 -->
  <div class="nav-counter-overlay" id="navOverlay">
    <div class="nav-counter-popup" id="navPopup">
      <div class="nav-arrow-up" id="navArrowUp">↑</div>
      <div class="nav-popup-counter" id="navPopupCounter">-- / --</div>
      <div class="nav-arrow-down" id="navArrowDown">↓</div>
    </div>
  </div>

  <!-- 日历选择器 -->
  <div class="cal-modal" id="calModal">
    <div class="cal-panel">
      <div class="cal-header">
        <button class="cal-nav" id="calPrev" onclick="calNav(-1)">‹</button>
        <span class="cal-title" id="calTitle">2026年4月</span>
        <button class="cal-nav" id="calNext" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="cal-weekday">一</div>
        <div class="cal-weekday">二</div>
        <div class="cal-weekday">三</div>
        <div class="cal-weekday">四</div>
        <div class="cal-weekday">五</div>
        <div class="cal-weekday">六</div>
        <div class="cal-weekday">日</div>
      </div>
      <div class="cal-footer">
        <button class="cal-cancel" onclick="closeCalendar()">取消</button>
        <button class="cal-confirm" id="calConfirm" onclick="confirmDate()" disabled>确定</button>
      </div>
    </div>
  </div>

  <!-- 日记编辑器 -->
  <div class="cal-modal" id="globalDiaryModal">
    <div class="cal-panel" style="max-width: 100%; border-radius: 16px;">
      <div class="cal-header">
        <span class="cal-title" id="globalDiaryTitle">📝 日记</span>
        <button class="cal-nav" onclick="closeGlobalDiary()">×</button>
      </div>
      <div class="diary-saved-msg" id="globalSavedMsg" style="margin: 10px 0 10px 0;">✓ 已保存</div>
      <div id="globalDiaryEditor" style="margin-bottom: 14px;"></div>
      <div class="cal-footer">
        <button class="cal-cancel" onclick="closeGlobalDiary()">取消</button>
        <button class="diary-edit-btn" onclick="saveGlobalDiary()">保存</button>
      </div>
    </div>
  </div>

</div>

<!-- Quill.js 富文本编辑器 -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<!-- 核心模块 -->
<script src="core/renderer.js"></script>
<script src="core/swipe.js"></script>
<script src="core/calendar.js"></script>
<script src="core/diary.js"></script>
<script src="core/timer.js"></script>
<script src="core/phrasebook.js"></script>
<script src="core/storage.js"></script>

<!-- 计时器浮动按钮 -->
<button class="fab-timer" id="timerFab" onclick="openTimerModal()" style="display: none;">⏱️</button>

<!-- 计时器弹窗 -->
<div class="cal-modal" id="timerModal">
  <div class="cal-panel">
    <div class="cal-header">
      <span class="cal-title" id="timerTitle">⏱️ 计时器</span>
      <button class="cal-nav" onclick="closeTimerModal()">×</button>
    </div>
    
    <div class="timer-display" id="timerDisplay">30:00</div>
    
    <div class="timer-controls">
      <button class="timer-btn start" onclick="startTimer()">开始</button>
      <button class="timer-btn pause" onclick="pauseTimer()">暂停</button>
      <button class="timer-btn reset" onclick="resetTimer()">重置</button>
    </div>
    
    <div style="font-size: 14px; margin-bottom: 8px; color: var(--text-dim); text-align: center;">快速预设：</div>
    <div class="timer-presets" id="timerPresets">
      <!-- 预设按钮动态生成 -->
    </div>
    
    <div class="timer-hint" id="timerHint">
      <!-- 提示文本动态设置 -->
    </div>
  </div>
</div>

<!-- 应用初始化 -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await initApp();
  });
</script>
</body>
</html>
