<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Travel Guide</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%235BC0EB' width='100' height='25'/><rect fill='%23F5A9B8' y='25' width='100' height='25'/><rect fill='%23FFFFFF' y='50' width='100' height='25'/><rect fill='%23F5A9B8' y='75' width='100' height='25'/></svg>">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

  <div class="track" id="track">
    <!-- Cards will be dynamically generated by core/renderer.js -->
  </div>

  <div class="nav-bar">
    <button class="nav-btn" id="prevBtn" onclick="goPrev()">← Prev</button>
    <button class="diary-btn-new" id="diaryBtn" onclick="openCalendar()">✏️ Diary</button>
    <span class="nav-counter" id="navCounter">-- / --</span>
    <button class="nav-btn" id="nextBtn" onclick="goNext()">Next →</button>
  </div>

  <!-- Page Selector Overlay -->
  <div class="nav-counter-overlay" id="navOverlay">
    <div class="nav-counter-popup" id="navPopup">
      <div class="nav-arrow-up" id="navArrowUp">↑</div>
      <div class="nav-popup-counter" id="navPopupCounter">-- / --</div>
      <div class="nav-arrow-down" id="navArrowDown">↓</div>
    </div>
  </div>

  <!-- Calendar Picker Modal -->
  <div class="cal-modal" id="calModal">
    <div class="cal-panel">
      <div class="cal-header">
        <button class="cal-nav" id="calPrev" onclick="calNav(-1)">‹</button>
        <span class="cal-title" id="calTitle">2026年4月</span>
        <button class="cal-nav" id="calNext" onclick="calNav(1)">›</button>
      </div>
      <div class="cal-grid" id="calGrid">
        <div class="cal-weekday">Mon</div>
        <div class="cal-weekday">Tue</div>
        <div class="cal-weekday">Wed</div>
        <div class="cal-weekday">Thu</div>
        <div class="cal-weekday">Fri</div>
        <div class="cal-weekday">Sat</div>
        <div class="cal-weekday">Sun</div>
      </div>
      <div class="cal-footer">
        <button class="cal-cancel" onclick="closeCalendar()">Cancel</button>
        <button class="cal-confirm" id="calConfirm" onclick="confirmDate()" disabled>Confirm</button>
      </div>
    </div>
  </div>

  <!-- Global Diary Modal -->
  <div class="cal-modal" id="globalDiaryModal">
    <div class="cal-panel" style="max-width: 100%; border-radius: 16px;">
      <div class="cal-header">
        <span class="cal-title" id="globalDiaryTitle">📝 Diary</span>
        <button class="cal-nav" onclick="closeGlobalDiary()">×</button>
      </div>
      <div class="diary-saved-msg" id="globalSavedMsg" style="margin: 10px 0 10px 0;">✓ Saved</div>
      <div id="globalDiaryEditor" style="margin-bottom: 14px;"></div>
      <div class="cal-footer">
        <button class="cal-cancel" onclick="closeGlobalDiary()">Cancel</button>
        <button class="diary-edit-btn" onclick="saveGlobalDiary()">Save</button>
      </div>
    </div>
  </div>

</div>

<!-- Quill.js for rich text editing -->
<link href="https://cdn.quilljs.com/1.3.7/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.7/quill.min.js"></script>

<!-- Core modules -->
<script src="core/renderer.js"></script>
<script src="core/swipe.js"></script>
<script src="core/calendar.js"></script>
<script src="core/diary.js"></script>
<script src="core/timer.js"></script>
<script src="core/phrasebook.js"></script>
<script src="core/storage.js"></script>

<!-- Floating Action Button for Timer -->
<button class="fab-timer" id="timerFab" onclick="openTimerModal()" style="display: none;">⏱️</button>

<!-- Timer Modal -->
<div class="cal-modal" id="timerModal">
  <div class="cal-panel">
    <div class="cal-header">
      <span class="cal-title" id="timerTitle">⏱️ Timer</span>
      <button class="cal-nav" onclick="closeTimerModal()">×</button>
    </div>
    
    <div class="timer-display" id="timerDisplay">30:00</div>
    
    <div class="timer-controls">
      <button class="timer-btn start" onclick="startTimer()">Start</button>
      <button class="timer-btn pause" onclick="pauseTimer()">Pause</button>
      <button class="timer-btn reset" onclick="resetTimer()">Reset</button>
    </div>
    
    <div style="font-size: 14px; margin-bottom: 8px; color: var(--text-dim); text-align: center;">Quick Presets:</div>
    <div class="timer-presets" id="timerPresets">
      <!-- Presets will be dynamically generated -->
    </div>
    
    <div class="timer-hint" id="timerHint">
      <!-- Hint text will be dynamically set -->
    </div>
  </div>
</div>

<!-- App initialization -->
<script>
  document.addEventListener('DOMContentLoaded', async () => {
    await initApp();
  });
</script>
</body>
</html>
